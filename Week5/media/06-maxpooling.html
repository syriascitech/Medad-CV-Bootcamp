<style>
    .pcell {
        width: 54px;
        height: 54px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1em;
        font-weight: bold;
        transition: all .3s;
    }

    .ocell {
        width: 78px;
        height: 78px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3em;
        font-weight: bold;
        transition: all .3s;
    }

    @keyframes popIn {
        from {
            transform: scale(.5)
        }

        to {
            transform: scale(1)
        }
    }
</style>
<div style="font-family:Segoe UI,sans-serif;background:#0f172a;padding:30px;border-radius:16px;color:white;">
    <h3 style="text-align:center;color:#f59e0b;margin-bottom:20px;">Max Poolingعملية الـ </h3>
    <div style="display:flex;justify-content:center;align-items:flex-start;gap:25px;flex-wrap:wrap;">
        <div style="text-align:center;">
            <p style="color:#94a3b8;margin-bottom:8px;">Feature Map (4×4)</p>
            <div id="pi" style="display:grid;grid-template-columns:repeat(4,54px);gap:3px;"></div>
        </div>
        <div style="padding-top:40px;text-align:center;">
            <div style="font-size:2em;color:#f59e0b;">→</div>
            <p style="color:#f59e0b;font-size:.8em;">Max Pool 2×2</p>
        </div>
        <div style="text-align:center;">
            <p style="color:#94a3b8;margin-bottom:8px;">Pooled Output (2×2)</p>
            <div id="po" style="display:grid;grid-template-columns:repeat(2,78px);gap:4px;"></div>
        </div>
        <div style="text-align:center;">
            <p style="color:#94a3b8;margin-bottom:8px;">الشرح</p>
            <div id="pe"
                style="padding:15px;background:#1e293b;border-radius:10px;min-width:180px;min-height:80px;font-size:.85em;border:1px solid #334155;">
            </div>
        </div>
    </div>
    <div style="text-align:center;margin-top:20px;display:flex;gap:10px;justify-content:center;">
        <button onclick="spP()"
            style="background:#b45309;color:white;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:1em;">▶
            خطوة</button>
        <button onclick="apP()"
            style="background:#d97706;color:white;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:1em;">⏩
            تلقائي</button>
        <button onclick="rpP()"
            style="background:#374151;color:white;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:1em;">↺
            إعادة</button>
    </div>
</div>
<script>
    const pd = [[1, 3, 4, 6], [5, 2, 8, 1], [3, 7, 2, 4], [1, 1, 3, 4]];
    const regs = [{ cells: [[0, 0], [0, 1], [1, 0], [1, 1]], desc: "top-left", max: 6 }, { cells: [[0, 2], [0, 3], [1, 2], [1, 3]], desc: "top-right", max: 8 }, { cells: [[2, 0], [2, 1], [3, 0], [3, 1]], desc: "bottom-left", max: 7 }, { cells: [[2, 2], [2, 3], [3, 2], [3, 3]], desc: "bottom-right", max: 4 }];
    let ps = 0, pt = null;
    function bP() {
        document.getElementById("pi").innerHTML = ""; document.getElementById("po").innerHTML = ""; document.getElementById("pe").innerHTML = "<p style='color:#475569;'>اضغط Step للبدء</p>";
        pd.forEach((row, r) => row.forEach((v, c) => { const d = document.createElement("div"); d.className = "pcell"; d.id = `p-${r}-${c}`; d.style.background = "#1e3a5f"; d.style.color = "#93c5fd"; d.textContent = v; document.getElementById("pi").appendChild(d); }));
        for (let i = 0; i < 4; i++) { const d = document.createElement("div"); d.className = "ocell"; d.id = `po-${i}`; d.style.background = "#1e293b"; d.style.color = "#64748b"; d.style.border = "2px dashed #334155"; d.textContent = "?"; document.getElementById("po").appendChild(d); }
    }
    function spP() {
        if (ps >= 4) return;
        document.querySelectorAll(".pcell").forEach(e => { e.style.background = "#1e3a5f"; e.style.color = "#93c5fd"; e.style.transform = "scale(1)"; });
        const reg = regs[ps];
        reg.cells.forEach(([r, c]) => { const el = document.getElementById(`p-${r}-${c}`); const isM = pd[r][c] === reg.max; el.style.background = isM ? "#f59e0b" : "rgba(245,158,11,.2)"; el.style.color = isM ? "#1e293b" : "#fbbf24"; if (isM) el.style.transform = "scale(1.1)"; });
        const oe = document.getElementById(`po-${ps}`); oe.textContent = reg.max; oe.style.background = "linear-gradient(135deg,#b45309,#d97706)"; oe.style.color = "white"; oe.style.border = "2px solid #f59e0b"; oe.style.animation = "popIn .3s ease";
        const vals = reg.cells.map(([r, c]) => pd[r][c]).join(", ");
        document.getElementById("pe").innerHTML = `<p style="color:#fbbf24;">منطقة: ${reg.desc}</p><p style="color:#94a3b8;">القيم: [${vals}]</p><p style="color:#f59e0b;">✓ Max = <strong>${reg.max}</strong></p>`;
        ps++;
    }
    function apP() { if (pt) { clearInterval(pt); pt = null; return; } pt = setInterval(() => { if (ps >= 4) { clearInterval(pt); pt = null; return; } spP(); }, 1200); }
    function rpP() { if (pt) { clearInterval(pt); pt = null; } ps = 0; bP(); }
    bP();
</script>
